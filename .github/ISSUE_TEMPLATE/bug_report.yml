---
name: "🐛 Bug Report"
description: "Report a bug or unexpected behavior"
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: environment
    attributes:
      label: "Environment"
      description: "OS / Flink version / Doris version / Node.js version"
      placeholder: "e.g. Windows 11 + WSL2 Ubuntu 22.04, Flink 1.20.1, Doris 2.1.0, Node.js 20.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "What happened? What did you expect to happen?"
      placeholder: "Describe the bug in detail..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "How can we reproduce this bug?"
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Screenshots"
      description: "Paste relevant error logs or screenshots (drag & drop images works)"
      placeholder: "Paste logs here..."

  - type: checkboxes
    id: confirmed
    attributes:
      label: "Confirmation"
      options:
        - label: "I have searched existing issues and this bug has not been reported before"
          required: true
